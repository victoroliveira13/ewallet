name: Beta Release

on:
  push:
    branches: [beta]

permissions:
  contents: write

jobs:
  pre-release:
    name: Create Beta Pre-Release
    runs-on: ubuntu-latest
    # Não roda em commits de bump de versão (evita loop)
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Get current version from package.json
        id: pkg_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Count existing beta releases for this version
        id: beta_count
        run: |
          VERSION=${{ steps.pkg_version.outputs.version }}
          # Conta tags beta existentes para a versão atual
          COUNT=$(git tag -l "v${VERSION}-beta.*" | wc -l | tr -d ' ')
          NEXT=$((COUNT + 1))
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-beta.${NEXT}" >> $GITHUB_OUTPUT

      - name: Create pre-release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.beta_count.outputs.tag }}
          git push origin ${{ steps.beta_count.outputs.tag }}

      - name: Generate changelog since last stable tag
        id: changelog
        run: |
          # Pega a última tag estável (sem -beta)
          LAST_STABLE=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" | grep -v beta | sort -V | tail -1)
          if [ -z "$LAST_STABLE" ]; then
            LAST_STABLE=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Gerando changelog desde: $LAST_STABLE"
          CHANGES=$(git log ${LAST_STABLE}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          # Salva em arquivo para evitar problemas com multiline
          echo "$CHANGES" > /tmp/changelog.txt
          echo "CHANGELOG_FILE=/tmp/changelog.txt" >> $GITHUB_ENV

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.beta_count.outputs.tag }}
          name: "🧪 Beta ${{ steps.beta_count.outputs.tag }}"
          body_path: /tmp/changelog.txt
          prerelease: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
