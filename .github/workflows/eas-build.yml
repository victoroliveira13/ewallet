name: EAS Build

on:
  push:
    branches:
      - beta
      - master
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'production'

jobs:
  build:
    name: EAS Build (${{ github.ref_name }})
    runs-on: ubuntu-latest
    # Não roda em commits automáticos de release/bump
    if: "!contains(github.event.head_commit.message, 'chore(release)')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      # beta → build preview (APK interno para QA)
      - name: EAS Build Preview (Android APK)
        if: github.ref == 'refs/heads/beta'
        run: eas build --platform android --profile preview --non-interactive

      # master → build production (Android AAB + iOS)
      - name: EAS Build Production
        if: github.ref == 'refs/heads/master'
        run: eas build --platform all --profile production --non-interactive
