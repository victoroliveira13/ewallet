name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Não roda em commits de bump de versão (evita loop)
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Get latest tag
        id: latest_tag
        run: |
          # Pega a última tag estável (sem -beta)
          LATEST=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" | grep -v beta | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          echo "Última tag: $LATEST"

      - name: Determine version bump from conventional commits
        id: bump
        run: |
          LATEST_TAG=${{ steps.latest_tag.outputs.tag }}
          CURRENT_VERSION=$(echo $LATEST_TAG | sed 's/^v//')

          # Pega commits desde a última tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s" --no-merges)
          fi

          echo "Commits analisados:"
          echo "$COMMITS"

          # Detecta tipo de bump
          BUMP="patch"  # padrão

          if echo "$COMMITS" | grep -q "BREAKING CHANGE\|!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?:|^hotfix(\(.+\))?:"; then
            BUMP="patch"
          fi

          echo "Tipo de bump: $BUMP"

          # Calcula nova versão
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case $BUMP in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          NEW_TAG="v${NEW_VERSION}"
          echo "Nova versão: $NEW_VERSION"
          echo "Nova tag: $NEW_TAG"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP" >> $GITHUB_OUTPUT

      - name: Update version in package.json and app.json
        run: |
          NEW_VERSION=${{ steps.bump.outputs.new_version }}

          # Atualiza package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Atualiza app.json
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = '${NEW_VERSION}';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "

          echo "✅ Versão atualizada para $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json app.json
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push origin master

      - name: Create release tag
        run: |
          git tag ${{ steps.bump.outputs.new_tag }}
          git push origin ${{ steps.bump.outputs.new_tag }}

      - name: Generate release changelog
        id: changelog
        run: |
          LATEST_TAG=${{ steps.latest_tag.outputs.tag }}
          NEW_TAG=${{ steps.bump.outputs.new_tag }}

          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            RAW_COMMITS=$(git log HEAD --pretty=format:"%s|%h|%an" --no-merges)
          else
            RAW_COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s|%h|%an" --no-merges)
          fi

          # Agrupa por tipo de commit
          FEATURES=""
          FIXES=""
          OTHERS=""

          while IFS='|' read -r msg hash author; do
            if echo "$msg" | grep -qE "^feat(\(.+\))?:"; then
              FEATURES="${FEATURES}\n- ${msg} (${hash})"
            elif echo "$msg" | grep -qE "^fix(\(.+\))?:|^hotfix(\(.+\))?:"; then
              FIXES="${FIXES}\n- ${msg} (${hash})"
            elif ! echo "$msg" | grep -qE "^chore\(release\)"; then
              OTHERS="${OTHERS}\n- ${msg} (${hash})"
            fi
          done <<< "$RAW_COMMITS"

          # Monta changelog
          {
            echo "## 🚀 What's Changed"
            echo ""
            if [ -n "$FEATURES" ]; then
              echo "### ✨ New Features"
              echo -e "$FEATURES"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo -e "$FIXES"
              echo ""
            fi
            if [ -n "$OTHERS" ]; then
              echo "### 🔧 Other Changes"
              echo -e "$OTHERS"
              echo ""
            fi
            echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${LATEST_TAG}...${NEW_TAG}"
          } > /tmp/release_notes.txt

          cat /tmp/release_notes.txt
          echo "RELEASE_NOTES_FILE=/tmp/release_notes.txt" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: "🚀 Release ${{ steps.bump.outputs.new_tag }}"
          body_path: /tmp/release_notes.txt
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
